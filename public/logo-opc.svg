<svg xmlns="http://www.w3.org/2000/svg" width="640" height="160" viewBox="0 0 640 160" role="img" aria-labelledby="title desc">
  <title id="title">One Piece Collector Logo</title>
  <desc id="desc">Rounded card icon with OPC monogram and site name</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect x="12" y="12" width="136" height="136" rx="26" fill="url(#bg)"/>
  <rect x="24" y="24" width="112" height="112" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <circle cx="80" cy="80" r="34" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <text x="80" y="89" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="700" fill="#f8fafc">OPC</text>

  <text x="170" y="74" font-family="Verdana, Geneva, sans-serif" font-size="42" font-weight="700" fill="#0f172a">One Piece</text>
  <text x="170" y="114" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700" fill="#334155">Collector</text>
</svg>
